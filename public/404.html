<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>REMS</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and search
      // into a query string, then adds a new entry to the browser's history
      // stack so the user doesn't see the query string, then redirects to the
      // root of the site with the query string added.
      (function(l) {
        if (l.search[1] === '/' ) {
          var q = l.search.slice(1).split('&').reduce(function(res, pair) {
            var parts = pair.split('=');
            res[parts[0]] = parts[1];
            return res;
          }, {});
          var url = q['p'] ?
            decodeURIComponent(q['p']) + (q['q'] ? '?' + q['q'] : '')
            : l.pathname + l.search + l.hash;
          console.log('Redirecting to', url);
          l.replace(l.origin + l.pathname + '#' + url);
        } else {
          console.warn('Redirect failed');
        }
      })(window.location);
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
